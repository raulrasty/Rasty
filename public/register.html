<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta - Rasty</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/register.css" />
  </head>
  <body>
    <div class="container">
      <h2>Crear cuenta</h2>
      <form id="registerForm" novalidate aria-label="Formulario de registro">

        <div class="form-group">
          <label for="username">Nombre de usuario</label>
          <input type="text" id="username" name="username"
            placeholder="Mínimo 3 caracteres" required
            aria-required="true" aria-describedby="usernameError" />
          <p class="field-error" id="usernameError" role="alert"></p>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email"
            placeholder="tu@email.com" required
            aria-required="true" aria-describedby="emailError" />
          <p class="field-error" id="emailError" role="alert"></p>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password"
              placeholder="Ej: Rasty2024" required
              aria-required="true" aria-describedby="passwordHint passwordError" />
            <button type="button" class="toggle-password" data-target="password"
              aria-label="Mostrar contraseña">👁</button>
          </div>
          <p class="field-hint" id="passwordHint">Mínimo 6 caracteres, una mayúscula, una minúscula y un número</p>
          <p class="field-error" id="passwordError" role="alert"></p>
        </div>

        <div class="form-group">
          <label for="passwordConfirm">Confirmar contraseña</label>
          <div class="input-password-wrap">
            <input type="password" id="passwordConfirm" name="passwordConfirm"
              placeholder="Repite la contraseña" required
              aria-required="true" aria-describedby="passwordConfirmError" />
            <button type="button" class="toggle-password" data-target="passwordConfirm"
              aria-label="Mostrar confirmación de contraseña">👁</button>
          </div>
          <p class="field-error" id="passwordConfirmError" role="alert"></p>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="acceptPrivacy" required
              aria-required="true" aria-describedby="acceptPrivacyError">
            He leído y acepto la <a href="/privacy.html" target="_blank">política de privacidad</a>
          </label>
          <p class="field-error" id="acceptPrivacyError" role="alert"></p>
        </div>

        <button type="submit" id="submitBtn">Registrarse</button>

        <p class="message">
          ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
        </p>

        <p id="errorMessage" class="error-message" role="alert" aria-live="polite"></p>
      </form>
    </div>
    <script src="/js/togglePassword.js"></script>
    <script src="js/register.js"></script>
    <script src="/js/cookieBanner.js"></script>
  </body>
</html>
