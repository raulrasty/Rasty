<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - Rasty</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div id="page-loader">
    <div class="loader-content">
      <span class="loader-logo">Rasty</span>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>
    <div class="container">
      <h2>Iniciar sesión</h2>

      <form id="login-form" novalidate aria-label="Formulario de inicio de sesión">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@email.com" required
            aria-required="true" aria-describedby="emailError" />
          <p class="field-error" id="emailError"></p>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-password-wrap">
            <input type="password" id="password" placeholder="Contraseña" required
              aria-required="true" aria-describedby="passwordError" />
            <button type="button" class="toggle-password" data-target="password"
              aria-label="Mostrar contraseña">👁</button>
          </div>
          <p class="field-error" id="passwordError"></p>
        </div>

        <button type="submit">Entrar</button>
      </form>

      <p id="error" class="error-message" role="alert" aria-live="polite"></p>
      <p class="message">
        ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
      </p>
    </div>
    <script src="/js/loader.js"></script>
    <script src="/js/togglePassword.js"></script>
    <script src="/js/auth.js"></script>
    <script src="js/login.js"></script>
    <script src="/js/cookieBanner.js"></script>
  </body>
</html>
