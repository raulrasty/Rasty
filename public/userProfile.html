<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Perfil de Usuario</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/userProfile.css">
</head>

<body>

  <div id="header-container"></div>

  <main class="profile-container">

    <div class="profile-info">
      <img id="avatar" src="" alt="Avatar">

      <h2 id="username">Cargando...</h2>
      <p id="bio">Sin biografía</p>
      <p id="location"></p>
      <p id="birth_date"></p>

      <!-- Contadores de seguidores y seguidos -->
      <div class="follow-stats">
        <span><strong id="followers-count">0</strong> seguidores</span>
        <span><strong id="following-count">0</strong> siguiendo</span>
      </div>

      <!-- Botón seguir/dejar de seguir (solo si no es tu perfil) -->
      <button id="followBtn" class="follow-btn hidden"></button>

      <!-- Botón editar (solo si es tu perfil) -->
      <button id="editProfileBtn" class="edit-btn hidden">Editar perfil</button>

      <!-- Botón ver escuchas (siempre visible) -->
      <button id="listensBtn" class="listens-btn">Ver escuchas</button>
    </div>

  </main>

  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/userProfile.js"></script>

</body>

</html>
