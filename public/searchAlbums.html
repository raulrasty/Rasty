<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Álbumes - Rasty</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/searchAlbums.css">
  <link rel="stylesheet" href="css/header.css">
</head>
<body>
  <div id="page-loader">
    <div class="loader-content">
      <span class="loader-logo">Rasty</span>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>
  <div id="header-container"></div>

  <main>
    <h1>Buscar Álbumes</h1>

    <form id="search-form" novalidate aria-label="Formulario de búsqueda de álbumes">
      <label for="artist" class="sr-only">Artista</label>
      <input type="text" id="artist" placeholder="Artista" required
        aria-required="true" aria-label="Nombre del artista">

      <label for="title" class="sr-only">Título del álbum</label>
      <input type="text" id="title" placeholder="Título"
        aria-label="Título del álbum">

      <button type="submit">Buscar</button>
    </form>

    <div id="albums" class="albums" aria-live="polite" aria-label="Resultados de búsqueda"></div>
    <nav id="albums-pagination" class="pagination pagination-bottom" aria-label="Paginación de álbumes"></nav>
  </main>

  <script src="/js/loader.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/favAlbumSelector.js"></script>
  <script src="js/searchAlbums.js"></script>
  <script src="/js/cookieBanner.js"></script>
</body>
</html>
