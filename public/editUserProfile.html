<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Perfil</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/editUserProfile.css">
</head>
<body>

  <div id="header-container"></div>

  <main class="edit-profile-container">

    <h2>Editar Perfil</h2>

    <form id="editProfileForm">

      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" disabled>
      </div>

      <div class="form-group">
        <label for="avatar_url">URL Avatar</label>
        <input type="file" id="avatar" name="avatar" accept="image/*">
        <img id="avatarPreview" src="" alt="Preview" style="width:100px;height:100px;border-radius:50%;display:none;margin-top:10px;">
      </div>

      <div class="form-group">
        <label for="bio">Biografía</label>
        <textarea id="bio" rows="4" placeholder="Escribe algo sobre ti..."></textarea>
      </div>

      <div class="form-group">
        <label for="location">Ubicación</label>
        <input type="text" id="location" placeholder="Ciudad, País">
      </div>

      <div class="form-group">
        <label for="birth_date">Fecha de Nacimiento</label>
        <input type="date" id="birth_date">
      </div>

      <button type="submit" class="btn-submit">Guardar Cambios</button>

    </form>

    <p id="message" class="message"></p>

  </main>

  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/editUserProfile.js"></script>

</body>
</html>
