<!-- header.html -->
<header class="main-header">
  <nav class="nav-links" id="navLinks">
    <a href="#" id="loginBtn">Iniciar sesión</a>
    <a href="/register.html">Crear cuenta</a>
  </nav>
</header>

<!-- MODAL LOGIN -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">&times;</span>
    <h2>Iniciar sesión</h2>

    <form id="loginForm" novalidate>
      <div class="modal-form-group">
        <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
        <p class="modal-field-error" id="loginEmailError"></p>
      </div>
      <div class="modal-form-group">
        <div class="input-password-wrap">
          <input type="password" id="loginPassword" placeholder="Contraseña" required>
          <button type="button" class="toggle-password" data-target="loginPassword">👁</button>
        </div>
        <p class="modal-field-error" id="loginPasswordError"></p>
      </div>
      <button type="submit" id="loginSubmitBtn">Entrar</button>
      <p id="loginError" class="error-message"></p>
    </form>

  </div>
</div>

<script src="/js/togglePassword.js"></script>
