<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Detalle del Álbum</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/albumInfo.css" />
</head>
<body>
  <div id="header-container"></div>

  <div class="album-container">
    <div class="album-card">
      <div class="album-info">
        <img id="album-cover" src="" alt="Portada del álbum" />
        <h1 id="album-title">Cargando...</h1>
        <h2 id="album-artist"></h2>
        <p id="album-year"></p>
      </div>

      <div class="songs-list">
        <h3>Canciones</h3>
        <ul id="songs-container"></ul>
      </div>

      <!-- Canciones favoritas del álbum (solo si estás logueado) -->
      <div id="favorite-songs-section" class="favorite-songs-section hidden">
        <h3>Tus canciones favoritas <span class="label-hint">(máximo 3)</span></h3>
        <ul id="album-favorite-songs-list" class="favorite-songs-list"></ul>
        <button id="save-favorites-btn">Guardar favoritas</button>
        <p id="favorites-message"></p>
      </div>

    </div>
  </div>

  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
  <script src="js/albumInfo.js"></script>
</body>
</html>
