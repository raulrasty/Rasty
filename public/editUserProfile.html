<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil - Rasty</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/editUserProfile.css">
</head>
<body>
  <div id="page-loader">
    <div class="loader-content">
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>
  <div id="header-container"></div>

  <main class="edit-profile-container">

    <h2>Editar Perfil</h2>

    <form id="editProfileForm" novalidate aria-label="Formulario de edición de perfil">

      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" disabled aria-disabled="true">
      </div>

      <div class="form-group">
        <label for="avatar">Foto de perfil</label>
        <input type="file" id="avatar" name="avatar" accept="image/*"
          aria-describedby="avatar-hint">
        <p id="avatar-hint" class="field-hint">Máximo 2MB. Formatos: JPG, PNG, GIF.</p>
        <img id="avatarPreview" src="" alt="Vista previa del avatar"
          class="avatar-preview hidden">
      </div>

      <div class="form-group">
        <label for="bio">Biografía</label>
        <textarea id="bio" rows="4" placeholder="Escribe algo sobre ti..."
          aria-describedby="bio-hint" maxlength="300"></textarea>
        <p id="bio-hint" class="field-hint">Máximo 300 caracteres.</p>
      </div>

      <div class="form-group">
        <label for="location">Ubicación</label>
        <input type="text" id="location" placeholder="Ciudad, País"
          maxlength="100">
      </div>

      <div class="form-group">
        <label for="birth_date">Fecha de Nacimiento</label>
        <input type="date" id="birth_date">
      </div>

      <button type="submit" class="btn-submit">Guardar Cambios</button>

    </form>

    <p id="message" class="message" role="status" aria-live="polite"></p>

    <div class="danger-zone" role="region" aria-labelledby="danger-zone-title">
      <h3 id="danger-zone-title">Precaución</h3>
      <p>Esta acción es irreversible. Se eliminarán todos tus datos, escuchas, valoraciones y seguidores.</p>
      <button type="button" id="delete-account-btn" class="btn-delete-account"
        aria-label="Eliminar mi cuenta permanentemente">
        Eliminar cuenta
      </button>
    </div>

  </main>
  <script src="/js/loader.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/editUserProfile.js"></script>
  <script src="/js/cookieBanner.js"></script>

</body>
</html>
