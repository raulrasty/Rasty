<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbumes escuchados - Rasty</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/userAlbums.css">
</head>
<body>
  <div id="page-loader">
    <div class="loader-content">
      <span class="loader-logo">Rasty</span>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>
  <div id="header-container"></div>

  <main class="albums-container">
    <div class="albums-header">
      <a id="back-btn" class="back-btn" role="button" tabindex="0"
        aria-label="Volver al perfil">← Volver al perfil</a>
      <h1 id="page-title">Álbumes escuchados</h1>
    </div>
    <div id="albums-grid" class="albums-grid" aria-live="polite"
      aria-label="Cuadrícula de álbumes escuchados"></div>
  </main>

  <script src="/js/loader.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/userAlbums.js"></script>
  <script src="/js/cookieBanner.js"></script>
</body>
</html>
