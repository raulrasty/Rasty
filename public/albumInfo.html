<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle del Álbum</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/albumInfo.css" />
</head>
<body>
  <div id="page-loader">
    <div class="loader-content">
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>
  </div>
  <div id="header-container"></div>

  <div class="album-container">
    <div class="album-card">

      <div class="album-top">
        <div class="album-info">
          <img id="album-cover" src="" alt="Portada del álbum" />
          <h1 id="album-title">Cargando...</h1>
          <h2 id="album-artist"></h2>
          <p id="album-year"></p>
          <a id="create-listen-btn" href="#" class="create-listen-btn hidden">Crear escucha</a>

          <button id="fav-album-btn" class="fav-album-btn hidden" aria-label="Añadir a favoritos">⭐ Añadir a favoritos</button>

          <div id="user-rating-section" class="user-rating-section hidden">
            <p class="rating-label" id="rating-label">Tu puntuación</p>
            <div class="star-rating" id="album-star-rating" role="group" aria-labelledby="rating-label">
              <span class="star" data-value="1">
                <span class="half" data-value="0.5" role="button" tabindex="0" aria-label="0.5 estrellas">★</span>
                <span class="full" data-value="1" role="button" tabindex="0" aria-label="1 estrella">★</span>
              </span>
              <span class="star" data-value="2">
                <span class="half" data-value="1.5" role="button" tabindex="0" aria-label="1.5 estrellas">★</span>
                <span class="full" data-value="2" role="button" tabindex="0" aria-label="2 estrellas">★</span>
              </span>
              <span class="star" data-value="3">
                <span class="half" data-value="2.5" role="button" tabindex="0" aria-label="2.5 estrellas">★</span>
                <span class="full" data-value="3" role="button" tabindex="0" aria-label="3 estrellas">★</span>
              </span>
              <span class="star" data-value="4">
                <span class="half" data-value="3.5" role="button" tabindex="0" aria-label="3.5 estrellas">★</span>
                <span class="full" data-value="4" role="button" tabindex="0" aria-label="4 estrellas">★</span>
              </span>
              <span class="star" data-value="5">
                <span class="half" data-value="4.5" role="button" tabindex="0" aria-label="4.5 estrellas">★</span>
                <span class="full" data-value="5" role="button" tabindex="0" aria-label="5 estrellas">★</span>
              </span>
            </div>
            <button id="save-rating-btn">Guardar puntuación</button>
            <p id="rating-message" role="status" aria-live="polite"></p>
          </div>
        </div>

        <div class="songs-list">
          <h3>Canciones</h3>
          <ul id="songs-container" aria-label="Lista de canciones"></ul>

          <div id="favorite-songs-section" class="favorite-songs-section hidden">
            <p id="favorites-message" role="status" aria-live="polite"></p>
            <button id="save-favorites-btn">Guardar favoritas</button>
          </div>
        </div>
      </div>

      <div class="album-bottom">

        <div id="following-section" class="following-section hidden">
          <h3>Tus seguidos</h3>
          <div id="following-list"></div>
        </div>

        <div class="community-section">
          <h3>Comunidad</h3>
          <div class="community-inner">
            <div class="community-rating">
              <p id="community-average" aria-live="polite"></p>
              <div id="rating-chart" class="rating-chart" aria-label="Distribución de valoraciones"></div>
            </div>
            <div class="community-songs">
              <p class="community-songs-label">Canciones favoritas</p>
              <ul id="community-favorites-list" aria-label="Canciones favoritas de la comunidad"></ul>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/loader.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/togglePassword.js"></script>
  <script src="/js/favAlbumSelector.js"></script>
  <script src="js/albumInfo.js"></script>
  <script src="/js/cookieBanner.js"></script>
</body>
</html>
